<?xml version="1.0" encoding="UTF-8"?>
<svg width="680" height="680" viewBox="0 0 680 680" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg { fill: #0A0A0F; }
    .film-track { fill: #111122; }
    .film-hole { fill: #0A0A0F; }
    .lens-outer { fill: #0D1B3E; stroke: #1E3A7A; stroke-width: 2; }
    .lens-mid { fill: #0A1428; stroke: #0A84FF; stroke-width: 1.5; }
    .lens-inner { fill: #050A14; stroke: #0A84FF; stroke-width: 1; opacity: 0.8; }
    .lens-core { fill: #0A84FF; opacity: 0.15; }
    .lens-glint { fill: white; opacity: 0.6; }
    .cut-line { stroke: #0A84FF; stroke-width: 3; stroke-linecap: round; }
    .cut-line-dim { stroke: #0A84FF; stroke-width: 1.5; stroke-linecap: round; opacity: 0.35; }
    .scene-rect { fill: none; stroke: #0A84FF; stroke-width: 1.5; opacity: 0.5; }
    .scene-rect-active { fill: #0A84FF; opacity: 0.12; stroke: #0A84FF; stroke-width: 2; }
    .glow-circle { fill: none; stroke: #0A84FF; stroke-width: 1; opacity: 0.1; }
    .spark { fill: #0A84FF; }
    .spark-dim { fill: #0A84FF; opacity: 0.4; }
    .label { font-family: -apple-system, sans-serif; font-size: 52px; font-weight: 700; fill: white; letter-spacing: -1px; }
    .label-sub { font-family: -apple-system, sans-serif; font-size: 20px; font-weight: 400; fill: #0A84FF; letter-spacing: 4px; }
  </style>

